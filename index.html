<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Md. Arnob Islam — SQA Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090B; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideDown { from { opacity:0; max-height:0; } to { opacity:1; max-height:800px; } }
    @keyframes slideUp { from { opacity:1; max-height:800px; } to { opacity:0; max-height:0; } }
    .card { background:#18181B; border:1px solid #27272A; border-radius:16px; padding:28px 32px; display:flex; flex-direction:column; transition: transform 0.2s ease, box-shadow 0.2s ease; position:relative; overflow:hidden; }
    .card:hover { transform:scale(1.015); box-shadow:0 0 0 1px #3B82F620, 0 8px 32px #0008; }
    .card::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.03); opacity:0; transition:opacity 0.3s; pointer-events:none; border-radius:16px; }
    .card:hover::before { opacity:1; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:1152px; margin:0 auto; }
    .col2 { grid-column: span 2; } .col1 { grid-column: span 1; }
    .accent { color: #3B82F6; }
    .tag { display:inline-flex; align-items:center; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; }
    .tag-accent { background:rgba(59,130,246,0.1); color:#3B82F6; border:1px solid rgba(59,130,246,0.2); }
    .tag-dim { background:rgba(255,255,255,0.05); color:#d1d5db; border:1px solid transparent; }
    .tag-ghost { background:rgba(255,255,255,0.05); color:#d1d5db; border:1px solid #27272A; font-size:10px; }
    .section-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#6b7280; margin-bottom:20px; }
    .accordion-job { border:1px solid #27272A; border-radius:12px; overflow:hidden; margin-bottom:8px; }
    .accordion-btn { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:none; border:none; color:inherit; cursor:pointer; text-align:left; transition:background 0.15s; }
    .accordion-btn:hover { background:rgba(255,255,255,0.04); }
    .accordion-content { overflow:hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height:0; opacity:0; }
    .accordion-content.open { max-height:800px; opacity:1; }
    .project-row { border:1px solid #27272A; border-radius:8px; overflow:hidden; margin-bottom:6px; }
    .project-btn { width:100%; display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:none; border:none; color:inherit; cursor:pointer; text-align:left; transition:background 0.15s; }
    .project-btn:hover { background:rgba(255,255,255,0.04); }
    .project-details { overflow:hidden; max-height:0; opacity:0; transition: max-height 0.25s ease, opacity 0.25s ease; border-top:1px solid #27272A; }
    .project-details.open { max-height:600px; opacity:1; }
    .chevron { transition: transform 0.3s; display:inline-block; font-size:12px; color:#6b7280; }
    .chevron.open { transform: rotate(180deg); }
    .chevron-right { transition: transform 0.3s; display:inline-block; font-size:11px; color:#3B82F6; }
    .chevron-right.open { transform: rotate(90deg); }
    .dot { width:7px; height:7px; border-radius:50%; background:#3B82F6; box-shadow:0 0 8px rgba(59,130,246,0.8); flex-shrink:0; }
    .role-text { font-size:1.1rem; color:#d1d5db; font-weight:500; }
    .stat-val { font-size:1.75rem; font-weight:700; color:#fff; transition:color 0.3s; }
    .card:hover .stat-val { color:#3B82F6; }
    .stat-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:#6b7280; font-weight:500; margin-top:2px; }
    .social-btn { display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,0.05); color:#9ca3af; transition:all 0.2s; text-decoration:none; font-size:15px; border:none; }
    .social-btn:hover { background:rgba(59,130,246,0.15); color:#3B82F6; }
    @media(max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} .col2{grid-column:span 2;} .col1{grid-column:span 1;} }
    @media(max-width:560px){ .grid{grid-template-columns:1fr;} .col2,.col1{grid-column:span 1;} }
  </style>

function HeroCard() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  useEffect(() => {
    const t = setInterval(() => {
      setVisible(false);
      setTimeout(() => { setIdx(i => (i+1)%ROLES.length); setVisible(true); }, 350);
    }, 3000);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="card col2" style={{animation:'fadeUp 0.5s ease both', animationDelay:'0.1s'}}>
      <p style={{color:'#9ca3af',fontSize:'14px',marginBottom:'8px',fontWeight:500}}>Hi, I'm</p>
      <h1 style={{fontSize:'clamp(28px,4vw,52px)',fontWeight:700,letterSpacing:'-0.03em',marginBottom:'16px'}}>MD ARNOB ISLAM</h1>
      <div style={{display:'flex',alignItems:'center',gap:'10px',height:'32px'}}>
        <div className="dot"/>
        <p className="role-text" style={{opacity: visible?1:0, transform: visible?'translateY(0)':'translateY(-10px)', transition:'opacity 0.35s, transform 0.35s'}}>
          {ROLES[idx]}
        </p>
      </div>
      <p style={{color:'#6b7280',fontSize:'13px',marginTop:'20px',lineHeight:'1.6',maxWidth:'440px'}}>
        SQA Engineer passionate about delivering reliable, scalable software through manual & automated testing. Based in Tangail, Dhaka, Bangladesh.
      </p>
    </div>
  );
}
